name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: pytest (CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pytest pytest-cov albumentations \
            segmentation-models-pytorch pytorch-lightning transformers peft

      - name: Run tests (CPU only, GPU tests skipped)
        run: pytest -m "not gpu"
