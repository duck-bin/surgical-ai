# Segmentation training config (CholecSeg8k).
defaults:
  - _self_
  - data: cholecseg8k
  - model: sam2_lora         # override with model=unet_baseline for the baseline

seed: 42
deterministic: true
precision: bf16-mixed        # fp16-mixed fallback on non-A100 hardware

epochs: 100
min_epochs: 40               # don't let early-stopping fire during the cystic_duct zero-Dice warmup
batch_size: 16               # effective batch; low_memory splits it 1 x 16-accum
low_memory: true             # T4/16GB GPUs: per-device batch 1, 16x grad accum
limit_batches: 1.0           # fraction (<=1.0) or int #batches per epoch; e.g. 20 for a smoke test
num_workers: 4               # DataLoader workers; lower to 2 on Colab (2 vCPUs) to avoid stalls

optimizer:
  name: adamw
  lr_encoder: 1.0e-4
  lr_decoder: 1.0e-3
  weight_decay: 0.01

scheduler:
  name: cosine
  warmup_epochs: 5

loss:
  dice_weight: 1.0
  focal_weight: 1.0
  focal_gamma: 2.0
  class_weighting: inv_sqrt_freq   # inverse sqrt frequency, clipped to class_weight_clip
  # Upper clip raised from 10 -> 30 so the ~0.03%-prevalence cystic_duct
  # (raw inv-sqrt weight ~57) actually gets a strong loss weight instead of
  # being capped to the same 10 as the common classes.
  class_weight_clip: [0.5, 30.0]

sampler: weighted_random           # WeightedRandomSampler on inverse class freq

early_stopping:
  # Selection target is the cystic_duct (the CVS-critical, thin/sparse class):
  # the best checkpoint is the epoch with the highest val cystic_duct Dice, not
  # the highest mean IoU (which is dominated by the large background/organ
  # classes). mIoU and every per-class Dice are still logged for analysis.
  monitor: val_cystic_duct_dice
  mode: max
  # Raised 10 -> 25: on a 0.03%-prevalence class the monitored Dice can sit at
  # zero for many epochs before it climbs; patience 10 read that as "converged"
  # and cut the first run at epoch 11. min_epochs (above) is the hard floor;
  # this patience then governs stopping only after the duct has had a chance.
  patience: 25

wandb:
  project: surgical-cvs-ai
  mode: disabled                   # set to "online"/"offline" to log to wandb
