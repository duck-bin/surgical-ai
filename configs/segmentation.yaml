# Segmentation training config (CholecSeg8k).
defaults:
  - _self_
  - data: cholecseg8k
  - model: sam2_lora         # override with model=unet_baseline for the baseline

seed: 42
deterministic: true
precision: bf16-mixed        # fp16-mixed fallback on non-A100 hardware

epochs: 100
min_epochs: 40               # don't let early-stopping fire during the cystic_duct zero-Dice warmup
batch_size: 16               # effective batch; low_memory splits it 1 x 16-accum
low_memory: true             # T4/16GB GPUs: per-device batch 1, 16x grad accum
limit_batches: 1.0           # fraction (<=1.0) or int #batches per epoch; e.g. 20 for a smoke test
num_workers: 4               # DataLoader workers; lower to 2 on Colab (2 vCPUs) to avoid stalls

optimizer:
  name: adamw
  lr_encoder: 1.0e-4
  lr_decoder: 1.0e-3
  weight_decay: 0.01

scheduler:
  name: cosine
  warmup_epochs: 5

loss:
  dice_weight: 1.0                 # weight on the region term (Dice or Tversky below)
  focal_weight: 1.0
  focal_gamma: 2.0
  # Region term tuned for small, thin structures (cystic_duct/artery): Tversky
  # with beta > alpha penalizes misses (false negatives) harder than false
  # positives, and gamma > 1 (focal-Tversky) focuses on the still-poorly-
  # segmented rare classes. Set region_loss=dice to recover plain Dice.
  region_loss: focal_tversky       # dice | tversky | focal_tversky
  tversky_alpha: 0.3               # false-positive weight
  tversky_beta: 0.7                # false-negative weight (recall on thin classes)
  tversky_gamma: 1.333             # focal-Tversky focusing (1.0 = plain Tversky)
  class_weighting: inv_sqrt_freq   # inverse sqrt frequency, clipped to class_weight_clip
  # Upper clip raised from 10 -> 30 so the ~0.03%-prevalence cystic_duct
  # (raw inv-sqrt weight ~57) actually gets a strong loss weight instead of
  # being capped to the same 10 as the common classes.
  class_weight_clip: [0.5, 30.0]

sampler: weighted_random           # WeightedRandomSampler on inverse class freq

# Rare-class copy-paste augmentation (Ghiasi et al., CVPR 2021): harvest
# cystic_duct (and, with Endoscapes, cystic_artery) patches from labelled frames
# and paste them onto other train frames, multiplying how often the rare
# structure and its boundaries are seen. Disabled by default (it adds a one-time
# raw-decode pass to harvest the bank); enable for the small-structure goal with
# copy_paste.enabled=true.
copy_paste:
  enabled: false
  classes: [cystic_duct, cystic_artery]   # rare classes to harvest/paste (both labelled in Endoscapes)
  paste_prob: 0.5                  # fraction of train frames that get a paste
  max_instances: 2                 # up to this many pasted instances per frame/clip
  scale_range: [0.7, 1.3]          # per-instance scale jitter
  p_flip: 0.5                      # horizontal-flip probability per instance
  margin: 0.25                     # context kept around each harvested instance
  min_pixels: 20                   # ignore sliver instances smaller than this
  max_per_class: 300               # cap on harvested instances per class

early_stopping:
  # Selection target is the cystic_duct (the CVS-critical, thin/sparse class):
  # the best checkpoint is the epoch with the highest val cystic_duct Dice, not
  # the highest mean IoU (which is dominated by the large background/organ
  # classes). mIoU and every per-class Dice are still logged for analysis.
  monitor: val_cystic_duct_dice
  mode: max
  # Raised 10 -> 25: on a 0.03%-prevalence class the monitored Dice can sit at
  # zero for many epochs before it climbs; patience 10 read that as "converged"
  # and cut the first run at epoch 11. min_epochs (above) is the hard floor;
  # this patience then governs stopping only after the duct has had a chance.
  patience: 25

wandb:
  project: surgical-cvs-ai
  mode: disabled                   # set to "online"/"offline" to log to wandb
