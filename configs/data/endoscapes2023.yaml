# Endoscapes2023 CVS benchmark (201 videos, 11,090 CVS-annotated frames).
# Requires PhysioNet credentialed access (czwq-jh81) — download manually.
name: endoscapes2023
root: ./data/endoscapes2023
# Layout (the official endoscapes.zip extracts to an endoscapes/ dir; the loader
# descends into it automatically):
#   <root>/<split>/<vid>_<frame>.jpg + <root>/all_metadata.csv (C1/C2/C3, is_ds_keyframe)
# Download: bash scripts/download_endoscapes.sh

num_cvs_criteria: 3
criteria: [c1_two_structures, c2_triangle_cleared, c3_cystic_plate_exposed]

image_size: 512
use_official_splits: true             # official video-level train/val/test splits
cvs_threshold: 0.5                    # >= this annotator agreement -> criterion met
