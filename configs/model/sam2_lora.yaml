# SAM2 + LoRA segmentation model (primary).
#
# Dense 6-class head: SAM2's mask decoder is repurposed to emit a prompt-free
# (B, num_classes, H, W) logit map (num_multimask_outputs = num_classes), so it
# trains with the shared SegmentationModule exactly like the U-Net baseline.
name: sam2_lora
loader: transformers                              # transformers.Sam2Model
base_checkpoint: facebook/sam2-hiera-base-plus    # ~80M params

num_classes: 6
sam2_image_size: 1024     # SAM2 Hiera backbone input resolution

# LoRA on the (frozen) Hiera vision encoder attention; the small mask decoder
# is fully fine-tuned (repurposed for a new class count).
lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules: [qkv]
