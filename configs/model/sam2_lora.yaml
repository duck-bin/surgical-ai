# SAM2 + LoRA segmentation model (primary).
name: sam2_lora
base_checkpoint: facebook/sam2-hiera-base-plus   # ~89M params
# TODO: verify SAM2 loading path (native sam2 package vs transformers Sam2Model).

lora:
  image_encoder:
    rank: 8
    alpha: 16
    target_modules: [qkv]
  mask_decoder:
    rank: 16
    alpha: 32

mask_generation:
  mode: automatic            # no point prompts at inference
  points_per_side: 32        # 32x32 grid
  nms_iou_threshold: 0.7

num_classes: 6
mask_classifier:             # assigns each SAM2 mask to one of 6 classes
  type: mlp                  # MLP on SAM2 mask-token embeddings
  hidden_dim: 256
