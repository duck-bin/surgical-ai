# CVS classifier training config (Endoscapes2023).
defaults:
  - _self_
  - /data: endoscapes2023

seed: 42
deterministic: true
precision: bf16-mixed

backbone: vit_small_patch16_224      # timm, ImageNet pretrained
in_channels: 9                       # 6 segmentation channels + 3 RGB
num_criteria: 3
classifier_image_size: 224           # ViT-Small input resolution

# Frozen segmentation model that supplies the 6 mask channels (trained first
# via src/train/train_segmentation.py).
segmentation:
  model_config: configs/model/sam2_lora.yaml
  checkpoint: outputs/sam2_lora/best.ckpt

epochs: 60
batch_size: 16               # effective batch; low_memory splits it 1 x 16-accum
low_memory: true             # T4/16GB GPUs: per-device batch 1, 16x grad accum

optimizer:
  name: adamw
  lr_backbone: 1.0e-4
  lr_heads: 1.0e-3
  weight_decay: 0.01

scheduler:
  name: cosine
  warmup_epochs: 5

loss:
  name: bce_with_logits
  class_weights: from_train_set      # computed from Endoscapes2023 train split

early_stopping:
  monitor: val_map
  mode: max
  patience: 10

wandb:
  project: surgical-cvs-ai
  mode: disabled
